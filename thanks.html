<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You | Raining Balls</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, Helvetica, sans-serif;

            background:#0f1118;

            color:white;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:20px;

        }

        .card{

            background:#171b25;

            padding:50px;

            border-radius:24px;

            text-align:center;

            max-width:600px;

            box-shadow:
                0 20px 50px rgba(0,0,0,.4);

        }

        .logo{

            width:90px;

            margin-bottom:25px;

        }

        h1{

            color:#ff5333;

            font-size:48px;

            margin-bottom:20px;

        }

        p{

            color:#d0d0d0;

            line-height:1.7;

            margin-bottom:35px;

            font-size:18px;

        }

        .button{

            display:inline-block;

            text-decoration:none;

            background:#ff5333;

            color:white;

            padding:16px 32px;

            border-radius:12px;

            font-weight:bold;

            transition:.2s;

        }

        .button:hover{

            transform:translateY(-3px);

        }

    </style>

</head>
<body>

    <div class="card">

        <img
            src="assets/logo.png"
            class="logo"
            alt="Raining Balls Logo">

        <h1>Thank You!</h1>

        <p>

            Your message has been sent successfully.

            We appreciate you taking the time to contact us and will review your message as soon as possible.

        </p>

        <a
            href="index.html"
            class="button">

            Back to Home

        </a>

    </div>

</body>
</html>
